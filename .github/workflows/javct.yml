name: JavCT Scraper

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  scrape-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Build Docker image
        run: |
          docker build -t javct-pipeline .

      - name: Run JavCT pipeline
        run: |
          docker run --rm \
            -v "${GITHUB_WORKSPACE}/results:/app/results" \
            -v "${GITHUB_WORKSPACE}/docs:/app/docs" \
            javct-pipeline \
            bash javct_pipeline.sh

      - name: Commit & push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add docs results || true

          if git diff --cached --quiet; then
            echo "ℹ️ No changes to commit"
          else
            git commit -m "chore(data): update JavCT results ($(date -u +'%Y-%m-%d %H:%M:%S UTC'))"
            git push origin main
            echo "✅ Changes pushed"
          fi

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./docs
          user_name: "github-actions[bot]"
          user_email: "41898282+github-actions[bot]@users.noreply.github.com"
          keep_files: false
